# ─────────────────────────────────────────────────────────────────────────────
# Siamese U-Net (FC-Siam-diff) Change Detection — Training Configuration
# Matched to train_config.yaml for fair ViT vs U-Net comparison.
# Override any field with a CLI flag: --lr 5e-4
# ─────────────────────────────────────────────────────────────────────────────

# ── Model selection ───────────────────────────────────────────────────────────
model: "unet"                 # vit | unet

# ── Data ──────────────────────────────────────────────────────────────────────
data_dir: "./LEVIR CD"
num_workers: 4

# ── Model (U-Net does not use these ViT keys, but they are kept for
#    compatibility so the same train.py can load either config) ────────────────
img_size: 256
patch_size: 16
in_channels: 3
embed_dim: 768
depth: 12
num_heads: 12
mlp_ratio: 4.0
dropout: 0.1
attn_dropout: 0.0
diff_type: "concat_project"
diff_out_dim: 256
decoder_dims: [128, 64, 32, 16]

# ── Loss (IDENTICAL to ViT config) ───────────────────────────────────────────
loss: "bce_dice"
bce_weight: 0.5
dice_weight: 0.5
pos_weight: 5.0
focal_alpha: 0.25
focal_gamma: 2.0

# ── Optimiser (IDENTICAL to ViT config) ──────────────────────────────────────
optimizer: "adamw"
lr: 1.0e-3
weight_decay: 0.05
grad_clip: 1.0

# ── Schedule (IDENTICAL to ViT config) ───────────────────────────────────────
epochs: 200
warmup_epochs: 10
min_lr: 1.0e-6

# ── Batch sizes (IDENTICAL to ViT config) ────────────────────────────────────
batch_size: 8
eval_batch_size: 16

# ── Logging & checkpointing ──────────────────────────────────────────────────
log_every: 10
output_dir: "./outputs/siamese_unet"
resume: null

# ── Early stopping (IDENTICAL to ViT config) ─────────────────────────────────
patience: 30
